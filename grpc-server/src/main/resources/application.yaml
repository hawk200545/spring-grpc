spring:
  application:
    name: grpc-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/grpc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9090}
      enabled: true
