spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/grpc
    username: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: gRPC
  grpc:
    server:
      port: 9090
      enabled: true


