syntax = "proto3";

option java_package = "com.hawk.grpc_client.proto";
option java_outer_classname = "EmployeeProto";
option java_multiple_files = true;

package com.example.hawk.grpc.employee;

message Employee {
  int32 id = 1;
  string name = 2;
  int32 age = 4;
}

message EmployeeByIdReq {
  int32 id = 1;
}

message EmployeeResponse{
  Employee employee=1;
}

message Employees {
  repeated Employee employees = 1;
}
message BulkEmployeeCreationResponse {
  int32 createdEmployees = 1;
}

message EmployeeCreationResponse{
  int32 employeeId=1;
}

message Empty {}

service EmployeeService {
  //Unary operations
  rpc getEmployeeById(EmployeeByIdReq) returns (EmployeeResponse);
  rpc getAllEmployee(Empty) returns (Employees);
  // Server Stream
  rpc subscribeEmployeeById(EmployeeByIdReq) returns (stream EmployeeResponse);
  // Client stream
  rpc bulkEmployeeCreation(stream Employee) returns (BulkEmployeeCreationResponse);
  // Bidirectional stream
  rpc liveEmployeeCreation(stream Employee) returns (stream EmployeeCreationResponse);
}